# streamingqa prompt-format variant (advisor's format): per-doc system prompt carries the
# question date + temporal instructions; the user turn is the bare question. Dataset,
# sampling, metrics, and judge are IDENTICAL to streamingqa.yaml — only the prompt differs.
task: streamingqa_longersystemprompt
custom_dataset: !function utils.load_streamingqa_longsys
test_split: test
output_type: generate_until
doc_to_text: !function utils.streamingqa_longsys_doc_to_text
# `description` names the doc column rendered as the system message (the long-system-prompt format,
# date-bearing, varies per doc).
description: system_prompt
doc_to_target: ""
process_results: !function utils.streamingqa_process_results
num_fewshot: 0
repeats: 1
generation_kwargs:
  until: []
  do_sample: true
  temperature: 0.7
  top_p: 0.95
  top_k: 20
  repetition_penalty: 1.1
  max_gen_toks: 64
filter_list:
  - name: all
    filter:
      - function: take_all
metric_list:
  - metric: leak_rate
    aggregation: !function utils.ratio_agg
    higher_is_better: false
  - metric: any_leak_rate
    aggregation: mean
    higher_is_better: false
  - metric: leak_rate_2020
    aggregation: !function utils.ratio_agg
    higher_is_better: false
  - metric: leak_rate_2016_2019
    aggregation: !function utils.ratio_agg
    higher_is_better: false
  - metric: leak_rate_forget
    aggregation: !function utils.ratio_agg
    higher_is_better: false
  - metric: leak_rate_retain
    aggregation: !function utils.ratio_agg
    higher_is_better: true
metadata:
  version: 1
